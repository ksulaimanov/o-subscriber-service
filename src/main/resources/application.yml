spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/o_subscriber_db
    username: postgres
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8083

app:
  jwt:
    secret: ${JWT_SECRET:myVerySecretKeyForJwtTokenGeneration123456}
    expiration: 86400000
  file:
    upload-dir: uploads/