<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>O! — Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .auth-card {
            width: 100%;
            max-width: 560px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            box-shadow: var(--o-shadow), 0 0 30px rgba(230, 0, 126, 0.16);
            padding: 32px;
        }

        .auth-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 26px;
        }

        .auth-brand-badge {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--o-pink), #ff4fb0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 28px;
            color: white;
            box-shadow: var(--o-glow);
        }

        .auth-title {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
        }

        .auth-subtitle {
            margin: 8px 0 0;
            color: var(--o-muted);
            line-height: 1.6;
        }

        .form-grid {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }

        .form-group {
            display: grid;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 700;
            color: #f5f5f5;
        }

        .form-input {
            width: 100%;
            height: 52px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            color: white;
            padding: 0 16px;
            outline: none;
            transition: 0.2s ease;
        }

        .form-input:focus {
            border-color: rgba(230, 0, 126, 0.6);
            box-shadow: 0 0 0 4px rgba(230, 0, 126, 0.12);
        }

        .field-error {
            color: #fca5a5;
            font-size: 13px;
        }

        .field-hint {
            color: var(--o-muted);
            font-size: 13px;
        }

        .alert-error {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(239, 68, 68, 0.14);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .link-row {
            margin-top: 18px;
            color: var(--o-muted);
        }

        .link-row a {
            color: var(--o-pink);
            text-decoration: none;
            font-weight: 700;
        }

        .link-row a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <div class="auth-brand">
            <div class="auth-brand-badge">O!</div>
            <div>
                <h1 class="auth-title">Регистрация</h1>
                <p class="auth-subtitle">
                    Создайте учётную запись для доступа к сервису абонента O!
                </p>
            </div>
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div th:if="${#fields.hasGlobalErrors()}" class="alert-error">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="fullName">ФИО</label>
                    <input class="form-input" id="fullName" type="text" th:field="*{fullName}" placeholder="Введите ФИО">
                    <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phoneNumber">Номер телефона</label>
                    <input class="form-input" id="phoneNumber" type="text" th:field="*{phoneNumber}" placeholder="+996700123456">
                    <div class="field-hint">Допустимы форматы: 0700123456, 700123456, 996700123456, +996700123456</div>
                    <div class="field-error" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Логин</label>
                    <input class="form-input" id="username" type="text" th:field="*{username}" placeholder="Введите логин">
                    <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <input class="form-input" id="password" type="password" th:field="*{password}" placeholder="Минимум 6 символов">
                    <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Подтверждение пароля</label>
                    <input class="form-input" id="confirmPassword" type="password" th:field="*{confirmPassword}" placeholder="Повторите пароль">
                    <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Создать аккаунт</button>
                    <a class="btn btn-secondary" href="/login">Назад ко входу</a>
                </div>
            </div>
        </form>

        <div class="link-row">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </section>
</main>
</body>
</html>
