<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>O! — Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <div class="auth-brand">
            <div class="auth-brand-badge">O!</div>
            <div>
                <h1 class="auth-title">Регистрация</h1>
                <p class="auth-subtitle">
                    Создайте учётную запись для доступа к сервису абонента O!
                </p>
            </div>
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div th:if="${#fields.hasGlobalErrors()}" class="alert-error">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="fullName">ФИО</label>
                    <input class="form-input" id="fullName" type="text" th:field="*{fullName}" placeholder="Введите ФИО">
                    <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phoneNumber">Номер телефона</label>
                    <input class="form-input" id="phoneNumber" type="text" th:field="*{phoneNumber}" placeholder="+996700123456">
                    <div class="field-hint">Допустимы форматы: 0700000623, 700000623, 996700000623, +996700000623</div>
                    <div class="field-error" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Логин</label>
                    <input class="form-input" id="username" type="text" th:field="*{username}" placeholder="Введите логин">
                    <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <input class="form-input" id="password" type="password" th:field="*{password}" placeholder="Минимум 6 символов">
                    <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Подтверждение пароля</label>
                    <input class="form-input" id="confirmPassword" type="password" th:field="*{confirmPassword}" placeholder="Повторите пароль">
                    <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Создать аккаунт</button>
                    <a class="btn btn-secondary" href="/login">Назад ко входу</a>
                </div>
            </div>
        </form>

        <div class="link-row">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </section>
</main>
</body>
</html>
