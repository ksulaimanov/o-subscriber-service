<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>O! — Страница не найдена</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <div class="auth-brand">
            <div class="auth-brand-badge">O!</div>
            <div>
                <h1 class="auth-title">404</h1>
                <p class="auth-subtitle">
                    Страница не найдена.
                </p>
            </div>
        </div>

        <div class="alert-error">
            Возможно, ссылка устарела или адрес был введён неверно.
        </div>

        <div class="actions">
            <a class="btn btn-primary" href="/home">На главную</a>
            <a class="btn btn-secondary" href="/profile">Мой профиль</a>
        </div>
    </section>
</main>
</body>
</html>
