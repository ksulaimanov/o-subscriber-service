<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>O! — Доступ ограничен</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <div class="auth-brand">
            <div class="auth-brand-badge">O!</div>
            <div>
                <h1 class="auth-title">403</h1>
                <p class="auth-subtitle">
                    У вас нет доступа к этой странице.
                </p>
            </div>
        </div>

        <div class="alert-error">
            Данный раздел недоступен для вашей роли. Вернитесь на главную страницу или войдите под другой учётной записью.
        </div>

        <div class="actions">
            <a class="btn btn-primary" href="/home">На главную</a>
            <a class="btn btn-secondary" href="/login">Ко входу</a>
        </div>
    </section>
</main>
</body>
</html>
