<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>O! — Профиль абонента</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .profile-layout {
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            gap: 24px;
            margin-top: 24px;
        }

        .profile-card {
            padding: 28px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--o-radius);
            box-shadow: var(--o-shadow);
        }

        .profile-avatar {
            width: 104px;
            height: 104px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--o-pink), #ff48aa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: 900;
            color: white;
            box-shadow: var(--o-glow);
            margin-bottom: 18px;
        }

        .profile-name {
            font-size: 30px;
            font-weight: 900;
            margin: 0 0 8px;
        }

        .profile-subtitle {
            color: var(--o-muted);
            margin-bottom: 18px;
            line-height: 1.6;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .profile-item {
            padding: 18px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .profile-item-label {
            color: var(--o-muted);
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .profile-item-value {
            font-size: 18px;
            font-weight: 800;
        }

        .profile-empty {
            padding: 40px;
            text-align: center;
            color: var(--o-muted);
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        @media (max-width: 960px) {
            .profile-layout,
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <div class="brand-badge">O!</div>
            <div>Сервис абонента</div>
        </div>

        <nav style="display:flex; gap:12px; align-items:center; flex-wrap: wrap;">
            <a class="btn btn-secondary" href="/home">Главная</a>
            <a class="btn btn-secondary" href="/profile">Мой профиль</a>
            <a class="btn btn-secondary" href="/subscribers-page">Абоненты</a>

            <form class="logout-form" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-primary" type="submit">Выйти</button>
            </form>
        </nav>
    </div>
</header>

<main class="container">
    <div th:if="${subscriber != null}" class="profile-layout">
        <div class="profile-card">
            <div class="profile-avatar"
                 th:text="${#strings.substring(subscriber.fullName, 0, 1)}">A</div>

            <h1 class="profile-name" th:text="${subscriber.fullName}">Имя Абонента</h1>
            <div class="profile-subtitle">
                Персональный профиль абонента с основной информацией о подключении,
                тарифном плане и текущем статусе обслуживания.
            </div>

            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <span class="tariff-badge" th:text="${subscriber.tariffPlan}">DIRECTOR</span>
                <span th:if="${subscriber.active}" class="status-badge status-active">Активен</span>
                <span th:unless="${subscriber.active}" class="status-badge status-inactive">Неактивен</span>
            </div>
        </div>

        <div class="profile-grid">
            <div class="profile-item">
                <div class="profile-item-label">Номер телефона</div>
                <div class="profile-item-value" th:text="${subscriber.phoneNumber}"></div>
            </div>

            <div class="profile-item">
                <div class="profile-item-label">Email</div>
                <div class="profile-item-value" th:text="${subscriber.email}"></div>
            </div>

            <div class="profile-item">
                <div class="profile-item-label">Баланс</div>
                <div class="profile-item-value" th:text="${subscriber.balance + ' сом'}"></div>
            </div>

            <div class="profile-item">
                <div class="profile-item-label">Тарифный план</div>
                <div class="profile-item-value" th:text="${subscriber.tariffPlan}"></div>
            </div>

            <div class="profile-item">
                <div class="profile-item-label">Статус</div>
                <div class="profile-item-value"
                     th:text="${subscriber.active ? 'Активен' : 'Неактивен'}"></div>
            </div>

            <div class="profile-item">
                <div class="profile-item-label">Фотография</div>
                <div class="profile-item-value"
                     th:text="${subscriber.photoPath != null and !#strings.isEmpty(subscriber.photoPath) ? 'Загружена' : 'Не загружена'}"></div>
            </div>
        </div>
    </div>

    <div th:if="${subscriber == null}" class="profile-empty">
        Данные абонента пока недоступны
    </div>
</main>
</body>
</html>
