<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>O! — Абоненты</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <div class="brand-badge">O!</div>
            <div>Сервис абонента</div>
        </div>

        <nav style="display:flex; gap:12px; align-items:center;">
            <a class="btn btn-secondary" href="/home">Главная</a>
            <a class="btn btn-secondary" href="/subscribers-page">Абоненты</a>

            <form class="logout-form" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-primary" type="submit">Выйти</button>
            </form>
        </nav>
    </div>
</header>

<main class="container">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>

    <div class="page-header">
        <div>
            <h1 class="page-title">Абоненты</h1>
            <p class="page-subtitle">
                Управление действующими клиентами и их тарифными параметрами
            </p>
        </div>
    </div>

    <div class="table-card" th:if="${subscribers != null and !subscribers.isEmpty()}">
        <table class="subscribers-table-fit">
            <thead>
            <tr>
                <th>Абонент</th>
                <th>Телефон</th>
                <th>Email</th>
                <th>Тариф</th>
                <th>Баланс</th>
                <th>Статус</th>
                <th>Профиль</th>
                <th>Действие</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="subscriber : ${subscribers}">
                <td>
                    <div class="subscriber-name-cell" th:text="${subscriber.fullName}"></div>
                </td>
                <td th:text="${subscriber.phoneNumber}"></td>
                <td class="subscriber-email-cell"
                    th:text="${subscriber.email != null ? subscriber.email : '—'}"></td>
                <td>
                    <span class="table-page-tariff-badge" th:text="${subscriber.tariffPlan}"></span>
                </td>
                <td class="balance" th:text="${subscriber.balance + ' сом'}"></td>
                <td>
                    <span th:if="${subscriber.active}" class="table-page-status-badge table-page-status-active">Активен</span>
                    <span th:unless="${subscriber.active}" class="table-page-status-badge table-page-status-inactive">Неактивен</span>
                </td>
                <td class="table-action">
                    <a class="btn btn-table-view"
                       th:href="@{/profile/{id}(id=${subscriber.id})}">
                        Открыть
                    </a>
                </td>
                <td class="table-action">
                    <form th:action="@{/subscribers/{id}/toggle-status(id=${subscriber.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button th:if="${subscriber.active}" class="btn btn-table-danger" type="submit">
                            Отключить
                        </button>
                        <button th:unless="${subscriber.active}" class="btn btn-table-primary" type="submit">
                            Активировать
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="table-card table-empty-state" th:if="${subscribers == null or subscribers.isEmpty()}">
        В системе пока нет абонентов
    </div>
</main>
</body>
</html>
